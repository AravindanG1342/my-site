<svg viewBox="0 0 290 118" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Birds from my Backyard — Birds of South India">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500&amp;family=DM+Sans:opsz,wght@9..40,300&amp;display=swap');
    </style>
  </defs>

  <!-- BIRDS OF SOUTH INDIA — small amber tracking, top -->
  <text
    x="145" y="18"
    text-anchor="middle"
    font-family="'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="8.5"
    font-weight="300"
    letter-spacing="3.2"
    fill="#b8882a">BIRDS OF SOUTH INDIA</text>

  <!-- Amber rule -->
  <line x1="0" y1="28" x2="290" y2="28" stroke="#b8882a" stroke-width="0.6"/>

  <!-- Line 1: Birds from -->
  <text
    x="145" y="72"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Palatino Linotype', Palatino, Georgia, serif"
    font-size="40"
    font-style="italic"
    font-weight="400"
    fill="currentColor">Birds from</text>

  <!-- Line 2: my Backyard -->
  <text
    x="145" y="112"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Palatino Linotype', Palatino, Georgia, serif"
    font-size="40"
    font-style="italic"
    font-weight="400"
    fill="currentColor">my Backyard</text>

  <!-- Fine rule below -->
  <line x1="0" y1="118" x2="290" y2="118" stroke="#b8882a" stroke-width="0.4" opacity="0.5"/>
</svg>
